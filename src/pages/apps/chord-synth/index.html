<!doctype html>
<html>
	<head>
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title data-i18n="title">Chord synth</title>
	</head>
	<body>
		<nav class="navbar">
			<main class="navbar-content">
				<div>
					<a class="brand" href="#" data-i18n="brand">Chord Synth</a>
				</div>
				<div>
					<a href="/apps" data-i18n="nav_apps">Apps</a>
				</div>
			</main>
		</nav>
		<main class="container">
			<div
				style="
					margin-bottom: 1rem;
					display: flex;
					flex-wrap: wrap;
					gap: 1rem;
				"
			>
				<label
					style="
						display: flex;
						align-items: center;
						gap: 0.5rem;
						cursor: pointer;
					"
				>
					<input type="checkbox" id="microtonal-mode" />
					<span data-i18n="microtonal">Microtonal Mode</span>
				</label>
				<label style="display: flex; align-items: center; gap: 0.5rem">
					<span data-i18n="instrument">Instrument</span>
					<select
						id="instrument-select"
						style="width: auto; margin: 0"
					>
						<option value="sine">Sine</option>
						<option value="square">Square</option>
						<option value="otamaton">Otamaton</option>
						<option value="bass">Bass</option>
						<option value="electric-bass">Electric Bass</option>
					</select>
				</label>
				<div style="display: flex; align-items: center; gap: 0.5rem">
					<span data-i18n="octave">Octave</span>
					<button
						id="octave-down"
						class="btn outline"
						style="padding: 0.25rem 0.5rem"
					>
						-
					</button>
					<span
						id="octave-display"
						style="
							min-width: 1.5rem;
							text-align: center;
							font-weight: bold;
						"
						>4</span
					>
					<button
						id="octave-up"
						class="btn outline"
						style="padding: 0.25rem 0.5rem"
					>
						+
					</button>
				</div>
				<label style="display: flex; align-items: center; gap: 0.5rem">
					<span data-i18n="root_note">Root Note</span>
					<select
						id="root-note-select"
						style="width: auto; margin: 0"
					>
						<option value="0">C</option>
						<option value="1">C#</option>
						<option value="2">D</option>
						<option value="3">D#</option>
						<option value="4">E</option>
						<option value="5">F</option>
						<option value="6">F#</option>
						<option value="7">G</option>
						<option value="8">G#</option>
						<option value="9">A</option>
						<option value="10">A#</option>
						<option value="11">B</option>
					</select>
				</label>
			</div>
			<div id="keys-circle"></div>

			<div style="margin-top: 1.5rem">
				<h3 style="margin-bottom: 0.75rem" data-i18n="chord_select">
					Chord Selection
				</h3>
				<div
					id="chord-grid"
					style="
						display: grid;
						grid-template-columns: repeat(4, 1fr);
						gap: 0.5rem;
					"
				>
					<!-- Chords will be generated by JS -->
				</div>
			</div>
		</main>
		<script type="module" src="./main.tsx"></script>
	</body>
</html>
