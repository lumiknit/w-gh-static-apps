<!doctype html>
<html>
	<head no-icon>
		<link
			rel="icon"
			type="image/png"
			href="/apps/year-calendar/favicon-96x96.png"
			sizes="96x96"
		/>
		<link rel="alternate icon" href="/apps/year-calendar/favicon.ico" />
		<link
			rel="icon"
			type="image/svg+xml"
			href="/apps/year-calendar/favicon.svg"
			sizes="any"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="/apps/year-calendar/apple-touch-icon.png"
		/>
		<meta name="apple-mobile-web-app-title" content="Calendar" />
		<link rel="manifest" href="/apps/year-calendar/site.webmanifest" />
		<title data-i18n="title">Year Calendar Generator</title>
	</head>

	<body>
		<nav class="navbar">
			<main class="navbar-content">
				<div>
					<a class="brand" href="#" data-i18n="brand"
						>Year Calendar</a
					>
				</div>
				<div>
					<a href="/apps" data-i18n="nav_apps">Apps</a>
				</div>
			</main>
		</nav>
		<main class="container">
			<header>
				<h1 data-i18n="title">Year Calendar Generator</h1>
				<p data-i18n="desc">
					Create custom yearly calendar wallpapers.
				</p>
			</header>

			<section id="section-settings">
				<h2 data-i18n="settings_title">Settings</h2>
				<div class="row">
					<label>Resolution:</label>
					<input
						id="widthInput"
						type="number"
						value="1920"
						min="100"
					/>
					x
					<input
						id="heightInput"
						type="number"
						value="1080"
						min="100"
					/>
				</div>
				<div class="row">
					<select id="presetSelect"></select>
				</div>
				<div class="row">
					<label>Background Color:</label>
					<input id="bgColor" type="color" value="#000000" />
				</div>
				<div class="row">
					<label>Foreground Color:</label>
					<input id="fgColor" type="color" value="#ffffff" />
				</div>
				<div class="row">
					<button id="randomColorBtn">Random Colors</button>
				</div>
				<div class="row">
					<label>Font :</label>
					<input id="fontFamily" type="text" value="sans-serif" />
				</div>
				<div class="row">
					<label>Year:</label>
					<input id="yearInput" type="number" value="2026" />
				</div>
				<div class="row">
					<label>Year font size (ratio):</label>
					<input
						id="yearSize"
						type="number"
						step="0.001"
						min="0.001"
						max="1"
						value="0.05"
					/>
				</div>
				<div class="row">
					<label>Date font size (ratio):</label>
					<input
						id="dateSize"
						type="number"
						step="0.001"
						min="0.0001"
						max="1"
						value="0.015"
					/>
				</div>
				<div class="row actions">
					<button id="saveBtn" class="primary">
						Save Image (PNG)
					</button>
				</div>
			</section>

			<hr />

			<section id="section-preview">
				<h2 data-i18n="preview_title">Preview</h2>
				<div class="canvas-container">
					<canvas id="calendarCanvas"></canvas>
				</div>
			</section>
		</main>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
