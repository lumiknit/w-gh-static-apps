<!doctype html>
<html>
	<head>
		<title>QR Util</title>
	</head>
	<body>
		<nav class="navbar">
			<div>
				<a class="brand" href="#">QR</a>
			</div>
			<div>
				<a href="/apps">Apps</a>
			</div>
		</nav>
		<main class="container">
			<header>
				<h1>QR Util</h1>
				<p>QR code image generator & scanner.</p>
			</header>

			<div role="group" id="tabs">
				<button id="btn-gen">Gen</button>
				<button id="btn-from-image" class="ghost">From Image</button>
				<button id="btn-from-camera" class="ghost">From Camera</button>
			</div>

			<section id="section-gen">
				<div class="output" id="gen-output" style="margin: 1rem">
					<svg height="0" width="0"></svg>
				</div>
				<button
					id="btn-share"
					class="secondary"
					hidden
					style="width: 100%; margin-bottom: 1rem"
				>
					Share
				</button>

				<label for="gen-text">Text</label>
				<textarea id="gen-text" name="text"></textarea>
				<button id="btn-generate" style="width: 100%">Generate</button>

				<div
					class="colors"
					style="display: flex; gap: 1rem; margin-top: 1rem"
				>
					<label style="flex: 1">
						Foreground
						<input type="color" id="color-dark" value="#000000" />
					</label>
					<label style="flex: 1">
						Background
						<input type="color" id="color-light" value="#ffffff" />
					</label>
				</div>

				<label>
					Error correction level
					<select id="gen-ecl">
						<option value="L">L</option>
						<option value="M">M</option>
						<option value="H" selected>H</option>
						<option value="Q">Q</option>
					</select>
				</label>
			</section>

			<section id="section-from-image" hidden>
				<label for="qr-file">QR code image</label>
				<input type="file" id="qr-file" accept="image/*" />
				<button
					id="btn-scan-image"
					style="width: 100%; margin-bottom: 1rem; margin-top: 1rem"
				>
					Scan
				</button>

				<progress id="scan-image-progress" hidden></progress>
				<pre id="scan-image-output" style="padding: 1rem"></pre>
			</section>

			<section id="section-from-camera" hidden>
				<video
					id="qr-video"
					style="width: 100%; margin-bottom: 1rem"
				></video>
				<pre id="scan-camera-output" style="padding: 1rem"></pre>
			</section>
		</main>
		<script type="module" src="./main.ts"></script>
	</body>
</html>
